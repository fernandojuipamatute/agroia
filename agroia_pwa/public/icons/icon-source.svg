<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo verde oscuro estilo agroindustrial -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B6D11"/>
      <stop offset="100%" stop-color="#243024"/>
    </linearGradient>
    
    <linearGradient id="avocadoSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52772B"/>
      <stop offset="100%" stop-color="#2F4A14"/>
    </linearGradient>
    
    <linearGradient id="avocadoFlesh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4DC8A"/>
      <stop offset="100%" stop-color="#A5AD5C"/>
    </linearGradient>
    
    <radialGradient id="pitGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#3D2415"/>
    </radialGradient>
  </defs>
  
  <!-- Fondo con esquinas redondeadas estilo iOS -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  
  <!-- Sutil patron decorativo (puntos) -->
  <g opacity="0.08">
    <circle cx="80" cy="80" r="3" fill="#FFFFFF"/>
    <circle cx="430" cy="80" r="3" fill="#FFFFFF"/>
    <circle cx="80" cy="430" r="3" fill="#FFFFFF"/>
    <circle cx="430" cy="430" r="3" fill="#FFFFFF"/>
    <circle cx="256" cy="50" r="2" fill="#FFFFFF"/>
    <circle cx="50" cy="256" r="2" fill="#FFFFFF"/>
    <circle cx="462" cy="256" r="2" fill="#FFFFFF"/>
    <circle cx="256" cy="462" r="2" fill="#FFFFFF"/>
  </g>
  
  <!-- Palta cortada vista frontal, estilo moderno y limpio -->
  <g transform="translate(256, 256)">
    <!-- Cascara externa (forma ovalada de palta) -->
    <ellipse cx="0" cy="-10" rx="125" ry="160" fill="url(#avocadoSkin)" stroke="#1F3308" stroke-width="3"/>
    
    <!-- Pulpa interior (verde claro/amarillento) -->
    <ellipse cx="0" cy="-10" rx="105" ry="140" fill="url(#avocadoFlesh)"/>
    
    <!-- Sombra interior sutil entre cascara y pulpa -->
    <ellipse cx="0" cy="-10" rx="105" ry="140" fill="none" stroke="#52772B" stroke-width="2" opacity="0.4"/>
    
    <!-- Pepa central (marron) -->
    <circle cx="0" cy="20" r="55" fill="url(#pitGrad)" stroke="#2D1A0F" stroke-width="2"/>
    
    <!-- Brillo en la pepa para volumen -->
    <ellipse cx="-15" cy="0" rx="20" ry="15" fill="#8C5A35" opacity="0.6"/>
    
    <!-- Tallo arriba de la palta -->
    <path d="M -8 -165 Q 0 -180 8 -170 L 5 -155 L -5 -155 Z" fill="#3B6D11" stroke="#1F3308" stroke-width="2"/>
    
    <!-- Hoja decorativa -->
    <path d="M 5 -165 Q 35 -185 50 -160 Q 30 -150 5 -155 Z" fill="#5B8C2A" stroke="#1F3308" stroke-width="2"/>
  </g>
  
  <!-- Texto AgroIA abajo -->
  <text x="256" y="465" 
        font-family="Georgia, serif" 
        font-weight="700" 
        font-size="46" 
        fill="#FFFFFF" 
        text-anchor="middle"
        letter-spacing="2">
    Agro<tspan font-style="italic" fill="#95C11F">IA</tspan>
  </text>
</svg>
